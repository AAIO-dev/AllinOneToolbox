<!DOCTYPE html>:
<html lang="en" dir="ltr">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Council - AAIO</title>
    <link rel="stylesheet" href="style.css">
    <style>
.thought-flash {
    position: absolute;
    pointer-events: none;
    /* اللون الذي اخترته #a29bfe مع شفافية 0.8 للوضوح */
    color: rgba(162, 155, 254, 0.8); 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 1.2rem;
    /* توهج خفيف بنفس درجة اللون ليعطي لمسة جمالية */
    text-shadow: 0 0 12px rgba(162, 155, 254, 0.6);
    z-index: 0 !important;
    transition: opacity 1.5s ease-in-out;
    opacity: 0;
}
body.messages-present .thought-flash {
    display: none !important; /* أو خفض الشفافية جداً */
}
</style>
</head>
<body class="council-body">
    <div id="stars-layer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; overflow: hidden;"></div>

    <header style="text-align: center; padding: 20px;">
        <a href="index.html">
            <img src="logo1.png" alt="AAIO Logo" class="main-council-logo">
        </a>
        <h1 class="council-title">AI Advisory Council</h1>
        <p class="council-tagline">
    Ask your question and watch the council (Gemini, ChatGPT, Claude, DeepSeek, Perplexity) share insights and collaborate.
</p>
    </header>

    <main id="council-interface">
    <div class="main-container">
        
        <div id="chat-window">
           
        </div>

        <div class="input-area">
    <div class="export-actions">
        <button id="summary-btn" class="export-btn" title="Get the Essence">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
        </button>
        <button id="full-export-btn" class="export-btn" title="Keep Every Detail">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        </button>
    </div>

    <textarea id="user-input" placeholder="Type your question or idea for discussion..." rows="2"></textarea>
    
    <button id="send-btn" onclick="startCouncilDiscussion()">Start Discussion</button>
</div>

    </div>
</main>
<script src="council.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@7.1.0/build/index.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</body>
</html>
